<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Isaac Oreoluwa</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:#080808;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;}
#root{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(1.5rem,5vw,3rem) clamp(1rem,5vw,1.5rem);text-align:center;width:100%;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;}
.eyebrow{font-size:clamp(9px,2vw,10px);font-weight:400;letter-spacing:0.3em;text-transform:uppercase;color:#3a3a3a;margin-bottom:clamp(1.5rem,5vw,3rem);line-height:1.6;}

/* Coin wrapper */
.coin-wrapper{perspective:900px;width:clamp(160px,45vw,240px);height:clamp(160px,45vw,240px);margin-bottom:clamp(1.5rem,5vw,3rem);cursor:pointer;position:relative;flex-shrink:0;}

/* Countdown SVG ring — sits outside coin */
#cRing{position:absolute;inset:-8.33%;width:116.67%;height:116.67%;pointer-events:none;opacity:0;transition:opacity 0.5s;transform:rotate(-90deg);}
#cRing.on{opacity:1;}
#cTrack{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:2;}
#cProgress{fill:none;stroke:#e8e8e8;stroke-width:1.8;stroke-linecap:round;transition:stroke 0.3s;}

/* Idle pulse glow */
.coin-wrapper::after{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(255,255,255,0.0);transition:border-color 0.6s,box-shadow 0.6s;pointer-events:none;}
.coin-wrapper.suspense::after{border-color:rgba(255,255,255,0.05);animation:pulseRing 1s ease-in-out infinite alternate;}
@keyframes pulseRing{from{box-shadow:0 0 20px 4px rgba(255,255,255,0.02);}to{box-shadow:0 0 60px 20px rgba(255,255,255,0.06);}}

.coin{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s ease;}
.coin.idle{animation:idleFlip 4s ease-in-out infinite;}
.coin-wrapper:hover .coin:not(.land-designer):not(.land-lifter){transform:rotateY(18deg) rotateX(6deg) scale(1.03);}
.coin.land-designer{animation:flipHeads 2.8s cubic-bezier(0.22,1,0.36,1) forwards;}
.coin.land-lifter{animation:flipTails 2.8s cubic-bezier(0.22,1,0.36,1) forwards;}

@keyframes idleFlip{
  0%{transform:rotateY(0deg);}
  45%{transform:rotateY(180deg);}
  50%{transform:rotateY(180deg);}
  95%{transform:rotateY(360deg);}
  100%{transform:rotateY(360deg);}
}
@keyframes flipHeads{
  0%{transform:rotateY(0deg) translateY(0) scale(1);}
  25%{transform:rotateY(720deg) translateY(-100px) scale(1.1);}
  55%{transform:rotateY(1440deg) translateY(-40px) scale(1.04);}
  75%{transform:rotateY(1800deg) translateY(-10px) scale(1.01);}
  100%{transform:rotateY(2160deg) translateY(0) scale(1);}
}
@keyframes flipTails{
  0%{transform:rotateY(0deg) translateY(0) scale(1);}
  25%{transform:rotateY(720deg) translateY(-100px) scale(1.1);}
  55%{transform:rotateY(1440deg) translateY(-40px) scale(1.04);}
  75%{transform:rotateY(1980deg) translateY(-10px) scale(1.01);}
  100%{transform:rotateY(2340deg) translateY(0) scale(1);}
}
.face{position:absolute;width:100%;height:100%;border-radius:50%;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;border:1.5px solid rgba(255,255,255,0.1);}
.face img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.face-front{transform:rotateY(0deg);}
.face-back{transform:rotateY(180deg);}


.toss-btn{padding:clamp(12px,3vw,15px) clamp(28px,8vw,52px);font-size:clamp(10px,2.5vw,11px);letter-spacing:0.22em;font-weight:500;text-transform:uppercase;border:1px solid #282828;border-radius:999px;background:transparent;color:#888;cursor:pointer;transition:border-color 0.2s,color 0.2s,transform 0.12s;font-family:inherit;width:auto;}
.toss-btn:hover{border-color:#555;color:#e0e0e0;}
.toss-btn:active{transform:scale(0.97);}
.toss-btn:disabled{opacity:0.2;cursor:not-allowed;}

.result-panel{opacity:0;transform:translateY(16px);transition:opacity 0.6s ease,transform 0.6s ease,max-height 0.6s ease;margin-top:0;pointer-events:none;width:100%;max-height:0;overflow:hidden;}
.result-panel.visible{opacity:1;transform:translateY(0);pointer-events:all;max-height:300px;margin-top:clamp(1.5rem,4vw,2.5rem);}
.result-side{font-size:clamp(9px,2vw,10px);letter-spacing:0.26em;text-transform:uppercase;color:#2e2e2e;margin-bottom:8px;}
.result-name{font-size:clamp(22px,6vw,28px);font-weight:500;color:#e8e8e8;letter-spacing:-0.01em;margin-bottom:0.6rem;line-height:1;}
.enter-btn{display:inline-block;padding:clamp(12px,3vw,15px) clamp(28px,8vw,48px);font-size:clamp(10px,2.5vw,11px);letter-spacing:0.2em;text-transform:uppercase;font-weight:500;border-radius:999px;cursor:pointer;font-family:inherit;border:none;background:#e8e8e8;color:#080808;transition:background 0.2s,transform 0.12s;width:auto;}
.enter-btn:hover{background:#fff;}
.enter-btn:active{transform:scale(0.97);}
.again-btn{background:none;border:1px solid #444;border-radius:999px;padding:clamp(9px,2.5vw,10px) clamp(20px,6vw,28px);font-size:clamp(9px,2.5vw,10px);letter-spacing:0.16em;text-transform:uppercase;color:#aaa;cursor:pointer;font-family:inherit;margin-top:1.2rem;display:block;margin-left:auto;margin-right:auto;transition:color 0.15s,border-color 0.15s;}
.again-btn:hover{color:#fff;border-color:#888;}

/* Redirect overlay */
#redirectOverlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080808;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.7s ease;}
#redirectOverlay.on{opacity:1;pointer-events:all;}
.r-label{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:#2a2a2a;margin-bottom:12px;}
.r-dest{font-size:clamp(24px,7vw,34px);font-weight:500;color:#e8e8e8;letter-spacing:-0.02em;margin-bottom:1rem;}
.r-sub{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#2a2a2a;}



.result-sub{font-size:clamp(11px,3vw,12px);letter-spacing:0.04em;color:#444;margin-bottom:1.6rem;font-style:italic;min-height:18px;transition:opacity 0.4s;}
@media(max-width:380px){
  .coin-wrapper{width:150px;height:150px;}
  .eyebrow{letter-spacing:0.15em;}
}
@media(min-width:768px){
  #root{padding:4rem 2rem;}
}

/* Corner UI */
.corner{position:fixed;z-index:20;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-family:'Helvetica Neue',Arial,sans-serif;transition:opacity 0.4s ease;}
.corner a{color:#888;text-decoration:none;transition:color 0.2s;}
.corner a:hover{color:#f0f0f0;}
#cTL{top:clamp(1rem,3vw,1.5rem);left:clamp(1rem,3vw,1.5rem);}
#cTR{top:clamp(1rem,3vw,1.5rem);right:clamp(1rem,3vw,1.5rem);}
#cBL{bottom:clamp(1rem,3vw,1.5rem);left:clamp(1rem,3vw,1.5rem);color:#888;font-size:10px;letter-spacing:0.22em;white-space:nowrap;}
/* Mute icon button */
#muteBtn{position:fixed;bottom:clamp(1rem,3vw,1.5rem);right:clamp(1rem,3vw,1.5rem);background:none;border:none;padding:0;cursor:pointer;font-size:18px;z-index:20;opacity:0.65;transition:opacity 0.2s;line-height:1;}
#muteBtn:hover{opacity:1;}

/* Light mode */
body.light{background:#f5f5f0;}
body.light .eyebrow{color:#bbb;}
body.light .toss-btn{border-color:#ccc;color:#555;}
body.light .toss-btn:hover{border-color:#888;color:#111;}
body.light .result-side{color:#bbb;}
body.light .result-name{color:#111;}
body.light .result-sub{color:#888;}
body.light .enter-btn{background:#111;color:#f5f5f0;}
body.light .again-btn{color:#888;border-color:#ccc;}
body.light .again-btn:hover{color:#111;border-color:#888;}
body.light #muteBtn svg{stroke:#555;}
body.light #muteBtn:hover{opacity:1;}
body.light #themeBtn svg{stroke:#555;}
body.light .corner a{color:#888;}
body.light .corner a:hover{color:#111;}
body.light #cBL{color:#aaa;}
body.light #redirectOverlay{background:#f5f5f0;}
body.light .r-dest{color:#111;}
body.light .r-sub{color:#aaa;}
body.light .r-label{color:#bbb;}
/* Theme button */
#themeBtn{
  position:fixed;
  bottom:clamp(1rem,3vw,1.5rem);
  right:calc(clamp(1rem,3vw,1.5rem) + 36px);
  background:none;border:none;padding:0;
  cursor:pointer;z-index:20;
  opacity:0.65;transition:opacity 0.2s;line-height:1;
}
#themeBtn:hover{opacity:1;}

/* Coin reflection */
.coin-reflection{
  position:absolute;
  bottom:-18%;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:30%;
  border-radius:50%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.07) 0%, transparent 70%);
  filter:blur(6px);
  pointer-events:none;
  transition:opacity 0.3s ease, transform 0.3s ease;
  z-index:-1;
}
/* Glow underneath */
.coin-glow{
  position:absolute;
  bottom:-24%;
  left:50%;
  transform:translateX(-50%) scaleY(0.35);
  width:90%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 65%);
  filter:blur(14px);
  pointer-events:none;
  z-index:-1;
  transition:opacity 0.4s ease;
}
/* Animate reflection during spin */
.coin.land-designer ~ .coin-reflection,
.coin.land-lifter ~ .coin-reflection{
  transform:translateX(-50%) scaleX(0.85);
  opacity:0.6;
}
/* Floor line */
.coin-reflection::after{
  content:'';
  position:absolute;
  bottom:-4px;
  left:10%;
  width:80%;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
}
body.light .coin-reflection{
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.06) 0%, transparent 70%);
}
body.light .coin-glow{
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.04) 0%, transparent 65%);
}
</style>
</head>

function fadeOut(h,dur){ if(!h)return; try{ var now=h.ctx.currentTime; h.gain.gain.setValueAtTime(h.gain.gain.value,now); h.gain.gain.linearRampToValueAtTime(0,now+(dur||0.5)); h.src.stop(now+(dur||0.5)+0.05); }catch(e){} }
function fadeIn(h,dur,to){ if(!h)return; try{ h.gain.gain.setValueAtTime(0,h.ctx.currentTime); h.gain.gain.linearRampToValueAtTime(to||0.65,h.ctx.currentTime+(dur||1)); }catch(e){} }

var preloaded=false;
document.addEventListener('click', function(){
  if(preloaded) return; preloaded=true;

  loadSound('spin', SND_SPIN);
  loadSound('land', SND_LAND);
}, {once:true});

function toggleMute(){
  muted=!muted;
  document.getElementById('iconSound').style.display = muted ? 'none' : '';
  document.getElementById('iconMute').style.display  = muted ? '' : 'none';
  if(muted){ fadeOut(musicHandle,0.6); musicHandle=null; }
  else if(buffers['music']){ musicHandle=playSound('music',true,0); fadeIn(musicHandle,1.5,0.65); }
}

/* ── Countdown ring ── */
var cdInterval=null, cdSide=null;

function startCountdown(side){
  cdSide = side;
  var prog    = document.getElementById('cProgress');
  var ring    = document.getElementById('cRing');
  var elapsed = 0;
  var total   = 5;

  // Init ring
  prog.style.strokeDasharray  = CIRC + ' ' + CIRC;
  prog.style.strokeDashoffset = '0';
  prog.style.stroke = '#e8e8e8';
  ring.classList.add('on');

  clearInterval(cdInterval);
  cdInterval = setInterval(function(){
    elapsed += 0.1;
    var fraction = elapsed / total;
    // Offset goes from 0 (full) to CIRC (empty)
    prog.style.strokeDashoffset = (fraction * CIRC).toFixed(2);

    // Colour shift: white -> orange -> red in last 4s
    if(elapsed > 6){
      var t = (elapsed-6)/4;
      var r = 232 + Math.round(23*t);
      var g = Math.round(232*(1-t));
      var b = Math.round(232*(1-t));
      prog.style.stroke = 'rgb('+r+','+g+','+b+')';
    }

    if(elapsed >= total){
      clearInterval(cdInterval); cdInterval=null;
      doRedirect(side);
    }
  }, 100);
}

function stopCountdown(){
  clearInterval(cdInterval); cdInterval=null;
  document.getElementById('cRing').classList.remove('on');
  document.getElementById('cProgress').style.strokeDashoffset = '0';
  document.getElementById('cProgress').style.stroke = '#e8e8e8';
}

function doRedirect(side){
  stopCountdown();
  var url  = side==='designer' ? DESIGNER_URL : LIFTER_URL;
  var name = side==='designer' ? 'Design Portfolio' : 'wildwide.wtf';
  document.getElementById('rDest').textContent = name;
  document.getElementById('redirectOverlay').classList.add('on');
  setTimeout(function(){
    if(side==='designer'){
      window.location.href = url;
    } else {
      window.open(url,'_blank');
    }
  }, 900);
}

/* ── Coin toss ── */
var spinning=false, landed=null;

function toss(){
  if(spinning) return; spinning=true;
  var coin    = document.getElementById('coin');
  var wrapper = document.getElementById('coinWrapper');
  var btn     = document.getElementById('tossBtn');
  var res     = document.getElementById('result');

  stopCountdown();
  btn.disabled=true;
  res.classList.remove('visible');
  wrapper.classList.add('suspense');

  setTimeout(function(){
    wrapper.classList.remove('suspense');
    playSound('spin',false,0.28);
    coin.className='coin'; void coin.offsetWidth;
    landed = Math.random()<0.5 ? 'designer' : 'lifter';
    coin.classList.add('land-'+landed);

    setTimeout(function(){ playSound('land',false,0.35); }, 2550);

    setTimeout(function(){
      spinning=false;
      showResult(landed);
    }, 3200);
  }, 400);
}

function showResult(side){
  var res  = document.getElementById('result');
  var name = document.getElementById('resultName');
  var btn  = document.getElementById('enterBtn');
  name.textContent = side==='designer' ? 'Design' : 'Performance';
  document.getElementById('resultSub').textContent = side==='designer'
    ? 'This is where the work speaks.'
    : 'Strength is the language spoken here.';
  btn.textContent  = 'ENTER →';
  btn.onclick = function(){
    stopCountdown();
    if(side==='designer'){
      window.location.href = DESIGNER_URL;
    } else {
      window.open(LIFTER_URL,'_blank');
    }
  };
  res.classList.add('visible');
  document.getElementById('tossBtn').style.display='none';
  // Hide corners on result screen
  ['cTL','cTR','cBL'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){el.style.opacity='0';el.style.pointerEvents='none';}
  });
  startCountdown(side);
}

function reset(){
  stopCountdown();
  document.getElementById('redirectOverlay').classList.remove('on');
  var coin    = document.getElementById('coin');
  var wrapper = document.getElementById('coinWrapper');
  var btn     = document.getElementById('tossBtn');
  var res     = document.getElementById('result');
  // Hide result immediately
  res.classList.remove('visible');
  // Restore corners
  ['cTL','cTR','cBL'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){el.style.opacity='';el.style.pointerEvents='';}
  });
  // Reset coin state then auto-toss
  coin.className='coin'; wrapper.classList.remove('suspense'); void coin.offsetWidth;
  btn.disabled=false; btn.style.display=''; landed=null;
  spinning=false;
  // Brief pause so the reset feels intentional, then auto-toss
  setTimeout(function(){ toss(); }, 300);
}

/* Clock */
function updateClock(){
  var now=new Date();
  var d=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
  var t=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clkDate').textContent=d;
  document.getElementById('clkTime').textContent=t;
}
updateClock();
setInterval(updateClock,1000);

/* Hide/show corner UI with redirect overlay */
function setCornerVisibility(visible){
  var els=['cTL','cTR','cBL','muteBtn'];
  els.forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.opacity=visible?'':'0';
  });
}

// Theme toggle
(function(){
  var saved = localStorage.getItem('coin-theme');
  if(saved === 'light') applyLight();

  function applyLight(){
    document.body.classList.add('light');
    var icon = document.getElementById('iconTheme');
    if(icon) icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    var snd = document.getElementById('iconSound');
    var mut = document.getElementById('iconMute');
    if(snd) snd.setAttribute('stroke','#555');
    if(mut) mut.setAttribute('stroke','#555');
  }

  function applyDark(){
    document.body.classList.remove('light');
    var icon = document.getElementById('iconTheme');
    if(icon) icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
    var snd = document.getElementById('iconSound');
    var mut = document.getElementById('iconMute');
    if(snd) snd.setAttribute('stroke','#e8e8e8');
    if(mut) mut.setAttribute('stroke','#e8e8e8');
  }

  window.toggleTheme = function(){
    if(document.body.classList.contains('light')){
      applyDark();
      localStorage.setItem('coin-theme','dark');
    } else {
      applyLight();
      localStorage.setItem('coin-theme','light');
    }
  };
})();
